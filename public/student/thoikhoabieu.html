<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu - Sinh Viên</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/student.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Thời Khóa Biểu</h1>
        </div>
        <input type="text" class="search-bar" placeholder="Tìm kiếm...">
        <div class="header-right">
            <div class="notification" style="cursor: pointer;">
                <i class="fas fa-bell"></i>
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </div>
            <div class="user-profile" id="userProfile">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <span class="user-name">Đang tải... <i class="fas fa-chevron-down" id="chevron"></i></span>
                <div class="dropdown-menu">
                    <a href="change-password.html" class="dropdown-item">
                        <i class="fas fa-key"></i> Đổi mật khẩu
                    </a>
                    <a href="../index.html" class="dropdown-item" id="logout">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <a href="trangchusv.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-text">Trang chủ</span>
            </a>
            <a href="thoikhoabieu.html" class="nav-item active">
                <i class="fas fa-calendar-alt nav-icon"></i>
                <span class="nav-text">Thời khóa biểu</span>
            </a>
            <a href="ketquahoctap.html" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
                <span class="nav-text">Kết quả học tập</span>
            </a>
            <a href="xemlichthi.html" class="nav-item">
                <i class="fas fa-newspaper nav-icon"></i>
                <span class="nav-text">Xem lịch thi</span>
            </a>
            <a href="guiphanhoi.html" class="nav-item">
                <i class="fas fa-file-alt nav-icon"></i>
                <span class="nav-text">Gửi phản hồi</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user-circle nav-icon"></i>
                <span class="nav-text">Thông tin cá nhân</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog nav-icon"></i>
                <span class="nav-text">Khác</span>
            </a>
        </nav>

        <div class="main-content">
            <div id="loading" class="loading-container">
                <i class="fas fa-spinner"></i>
                <p>Đang tải thời khóa biểu...</p>
            </div>

            <div id="scheduleContent" style="display: none;">
                <div class="schedule-info-card">
                    <div class="info-box">
                        <i class="fas fa-user-graduate"></i>
                        <div class="info-box-content">
                            <h4>Sinh viên</h4>
                            <p id="studentName">Loading...</p>
                        </div>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-users"></i>
                        <div class="info-box-content">
                            <h4>Lớp</h4>
                            <p id="className">Loading...</p>
                        </div>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-book-open"></i>
                        <div class="info-box-content">
                            <h4>Số môn học</h4>
                            <p id="subjectCount">0</p>
                        </div>
                    </div>
                </div>

                <div class="schedule-table-container">
                    <table class="schedule-table">
                        <thead>
                            <tr>
                                <th>Tiết / Thứ</th>
                                <th>Thứ 2</th>
                                <th>Thứ 3</th>
                                <th>Thứ 4</th>
                                <th>Thứ 5</th>
                                <th>Thứ 6</th>
                                <th>Thứ 7</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal Chi Tiết -->
        <div id="detailModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Chi Tiết Lịch Học</h2>
                    <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body" id="modalBody">
                </div>
            </div>
        </div>

    </div>

    <script src="../js/scriptsv.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let scheduleData = [];

        // Lấy thông tin sinh viên và thời khóa biểu
        async function loadSchedule() {
            try {
                const maTK = sessionStorage.getItem('maTK');
                const userRole = sessionStorage.getItem('userRole');

                if (!maTK || userRole?.toLowerCase() !== 'sinhvien') {
                    alert('Vui lòng đăng nhập với tài khoản sinh viên!');
                    window.location.href = '../index.html';
                    return;
                }

                // Lấy thông tin sinh viên
                const svResponse = await fetch(`${API_BASE_URL}/students/by-account?maTK=${maTK}`);
                if (!svResponse.ok) throw new Error('Không thể tải thông tin sinh viên');

                const sinhVien = await svResponse.json();

                // Hiển thị thông tin sinh viên
                document.getElementById('studentName').textContent = sinhVien.hoTen;
                document.getElementById('className').textContent = sinhVien.tenLop || sinhVien.maLop;

                // Lấy danh sách phân công của lớp
                const pcResponse = await fetch(`${API_BASE_URL}/phancong`);
                if (!pcResponse.ok) throw new Error('Không thể tải thời khóa biểu');

                const allPhanCong = await pcResponse.json();

                // Lọc phân công của lớp sinh viên
                const lopPhanCong = allPhanCong.filter(pc => pc.maLop === sinhVien.maLop);

                document.getElementById('subjectCount').textContent = lopPhanCong.length;

                // Xử lý lịch học
                scheduleData = [];
                lopPhanCong.forEach(pc => {
                    if (pc.lich && pc.lich.length > 0) {
                        pc.lich.forEach(lich => {
                            scheduleData.push({
                                ...lich,
                                tenMH: pc.tenMH,
                                maMH: pc.maMH,
                                hoTenGV: pc.hoTen,
                                maGV: pc.maGV,
                                hocKy: pc.hocKy
                            });
                        });
                    }
                });

                // Trong loadSchedule(), sau khi thu thập scheduleData
                scheduleData = scheduleData.sort((a, b) => a.thu_tuan - b.thu_tuan || a.tiet_bat_dau - b.tiet_bat_dau);

                // GỘP CÁC TIẾT LIÊN TỤC CỦA CÙNG MÔN, CÙNG THỨ
                let merged = [];
                scheduleData.forEach(item => {
                    const last = merged[merged.length - 1];
                    if (last &&
                        last.thu_tuan === item.thu_tuan &&
                        last.maMH === item.maMH &&
                        last.tiet_bat_dau + last.so_tiet === item.tiet_bat_dau
                    ) {
                        last.so_tiet += item.so_tiet;
                    } else {
                        merged.push({ ...item });
                    }
                });
                scheduleData = merged;

                renderSchedule();
                console.log('Schedule Data:', scheduleData);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('scheduleContent').style.display = 'block';

            } catch (error) {
                console.error('Lỗi:', error);
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="background: linear-gradient(135deg, #ef4444, #dc2626); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <p style="color: #ef4444;">Không thể tải thời khóa biểu. Vui lòng thử lại sau!</p>
                `;
            }
        }

        function renderSchedule() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            const tietHoc = [
                { tiet: 1, gio: '7:00 - 7:50' },
                { tiet: 2, gio: '8:00 - 8:50' },
                { tiet: 3, gio: '9:00 - 9:50' },
                { tiet: 4, gio: '10:00 - 10:50' },
                { tiet: 5, gio: '11:00 - 11:50' },
                { tiet: 6, gio: '13:00 - 13:50' },
                { tiet: 7, gio: '14:00 - 14:50' },
                { tiet: 8, gio: '15:00 - 15:50' },
                { tiet: 9, gio: '16:00 - 16:50' },
                { tiet: 10, gio: '17:00 - 17:50' },
                { tiet: 11, gio: '18:00 - 18:50' },
                { tiet: 12, gio: '19:00 - 19:50' }
            ];

            // Map theo dõi các ô bị gộp: key = thu-tiet
            const mergedCells = new Map();

            tietHoc.forEach(({ tiet, gio }) => {
                const tr = document.createElement('tr');

                // Cột tiết (luôn có)
                const tdTiet = document.createElement('td');
                tdTiet.innerHTML = `<strong>Tiết ${tiet}</strong><small>${gio}</small>`;
                tr.appendChild(tdTiet);

                // Duyệt từng thứ (2 → 7)
                for (let thu = 2; thu <= 7; thu++) {
                    const cellKey = `${thu}-${tiet}`;

                    // NẾU Ô NÀY ĐÃ BỊ GỘP TỪ DÒNG TRÊN → BỎ QUA HOÀN TOÀN
                    if (mergedCells.has(cellKey)) {
                        continue;
                    }

                    // Tìm lịch học tại tiết này
                    const lich = scheduleData.find(l =>
                        l.thu_tuan === thu &&
                        l.tiet_bat_dau === tiet
                    )

                    if (lich) {
                        // TẠO Ô CÓ ROWSPAN TẠI TIẾT BẮT ĐẦU
                        const td = document.createElement('td');
                        td.rowSpan = lich.so_tiet;
                        td.className = 'class-cell';

                        // ĐÁNH DẤU CÁC Ô DƯỚI SẼ BỊ GỘP
                        for (let i = 1; i < lich.so_tiet; i++) {
                            mergedCells.set(`${thu}-${tiet + i}`, true);
                        }

                        td.innerHTML = `
                    <div class="class-item" onclick="showDetail(${JSON.stringify(lich).split('"').join('&quot;')})">
                        <h4>${lich.tenMH}</h4>
                        <p><i class="fas fa-clock"></i> Tiết ${lich.tiet_bat_dau} - ${lich.tiet_bat_dau + lich.so_tiet - 1}</p>
                        <small><i class="fas fa-door-open"></i> ${lich.phong_hoc || 'Chưa có'}</small>
                    </div>`;

                        tr.appendChild(td);
                    } else {
                        // Ô TRỐNG HOẶC KHÔNG CÓ LỊCH
                        const td = document.createElement('td');
                        td.className = 'class-cell';
                        td.innerHTML = '<span class="empty-cell">-</span>';
                        tr.appendChild(td);
                    }
                }

                tbody.appendChild(tr);
            });
        }

        // Hiển thị chi tiết
        function showDetail(lich) {
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');

            const thuMap = { 2: 'Hai', 3: 'Ba', 4: 'Tư', 5: 'Năm', 6: 'Sáu', 7: 'Bảy' };

            modalBody.innerHTML = `
                <div class="detail-item">
                    <i class="fas fa-book"></i>
                    <div>
                        <h4>Môn học</h4>
                        <p>${lich.tenMH} (${lich.maMH})</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <div>
                        <h4>Giảng viên</h4>
                        <p>${lich.hoTenGV}</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-calendar-day"></i>
                    <div>
                        <h4>Thứ</h4>
                        <p>Thứ ${thuMap[lich.thu_tuan]}</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h4>Tiết học</h4>
                        <p>Tiết ${lich.tiet_bat_dau} - ${lich.tiet_bat_dau + lich.so_tiet - 1} (${lich.so_tiet} tiết)</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-door-open"></i>
                    <div>
                        <h4>Phòng học</h4>
                        <p>${lich.phong_hoc || 'Chưa xác định'}</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-graduation-cap"></i>
                    <div>
                        <h4>Học kỳ</h4>
                        <p>${lich.hocKy || 'Chưa có'}</p>
                    </div>
                </div>
                ${lich.ghi_chu ? `
                <div class="detail-item">
                    <i class="fas fa-sticky-note"></i>
                    <div>
                        <h4>Ghi chú</h4>
                        <p>${lich.ghi_chu}</p>
                    </div>
                </div>` : ''}
            `;

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // Đóng modal khi click bên ngoài
        window.onclick = function (event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // ✅ THÊM CODE NÀY SAU DÒNG: const API_BASE_URL = 'http://localhost:3000/api';

        // Load notification count
        async function loadNotificationCount() {
            try {
                const maTK = sessionStorage.getItem('maTK');
                if (!maTK) return;

                const studentResponse = await fetch(`${API_BASE_URL}/students/by-account?maTK=${maTK}`);
                if (!studentResponse.ok) return;

                const studentInfo = await studentResponse.json();

                const response = await fetch(`${API_BASE_URL}/feedback/student/${studentInfo.maSV}`);
                if (!response.ok) return;

                const feedbackList = await response.json();
                const repliedCount = feedbackList.filter(fb => fb.phanHoiPhu).length;

                const badge = document.getElementById('notificationBadge');
                if (repliedCount > 0) {
                    badge.textContent = repliedCount;
                    badge.style.display = 'flex';
                }
            } catch (error) {
                console.error('Lỗi tải thông báo:', error);
            }
        }

        // Click vào chuông chuyển trang
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.notification').addEventListener('click', () => {
                window.location.href = 'xemphanhoi.html';
            });

            // Load notification khi trang load
            loadNotificationCount();
        });

        // Load khi trang sẵn sàng
        document.addEventListener('DOMContentLoaded', loadSchedule);
    </script>
</body>

</html>
